name: Update ARB Files

on:
  pull_request_target:
    branches:
      - main

jobs:
  update-arb:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.5'

      - name: Fix locale codes in ARB files
        run: |
          sed -i 's/"ur-PK"/"ur"/g' lib/l10n/app_ur.arb
          sed -i 's/"es-ES"/"es"/g' lib/l10n/app_es.arb
          sed -i 's/"pt-PT"/"pt"/g' lib/l10n/app_pt.arb
          sed -i 's/"ckb"/"ku"/g'   lib/l10n/app_ku.arb
          sed -i 's/"sv-SE"/"sv"/g' lib/l10n/app_sv.arb
          sed -i 's/"si-LK"/"si"/g' lib/l10n/app_si.arb
          sed -i 's/"pa-PK"/"pa"/g' lib/l10n/app_pa.arb
          sed -i 's/"fa-AF"/"fa_AF"/g' lib/l10n/app_fa_AF.arb

      - name: Run flutter gen-l10n
        run: flutter gen-l10n

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/gen_l10n/ lib/l10n/
          git diff --staged --quiet || git commit -m "chore: regenerate l10n"
          git push
